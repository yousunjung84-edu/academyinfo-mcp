name: Candidate build verification

on:
  workflow_dispatch:
    inputs:
      version:
        description: Exact administrator-selected unused SemVer (never a tag name)
        required: true
        type: string
      source_commit:
        description: Full approved tagged source commit
        required: true
        type: string
      source_tag:
        description: Approved immutable git tag that resolves to source_commit
        required: true
        type: string
      receipt_commit:
        description: Protected default-branch commit containing candidate-authorization.v1.json
        required: true
        type: string
      authorization_receipt_digest:
        description: SHA-256 digest of the immutable candidate authorization receipt
        required: true
        type: string
      authorization_context_digest:
        description: SHA-256 of the closed candidate authorization event/source context
        required: true
        type: string
      expected_previous_latest:
        description: Exact version currently on latest, recorded by the authorization receipt
        required: true
        type: string
      confirm_candidate_only:
        description: Type publish-to-candidate-not-latest
        required: true
        type: string

concurrency:
  group: academyinfo-mcp-candidate-verification
  cancel-in-progress: false

permissions:
  contents: read

env:
  PACKAGE_NAME: academyinfo-mcp
  VERSION: ${{ inputs.version }}
  SOURCE_COMMIT: ${{ inputs.source_commit }}
  SOURCE_TAG: ${{ inputs.source_tag }}
  RECEIPT_COMMIT: ${{ inputs.receipt_commit }}
  POLICY_COMMIT: ${{ github.sha }}
  AUTHORIZATION_RECEIPT_DIGEST: ${{ inputs.authorization_receipt_digest }}
  AUTHORIZATION_CONTEXT_DIGEST: ${{ inputs.authorization_context_digest }}
  EXPECTED_PREVIOUS_LATEST: ${{ inputs.expected_previous_latest }}
  CONFIRM_CANDIDATE_ONLY: ${{ inputs.confirm_candidate_only }}
  REPOSITORY: ${{ github.repository }}
  TRUSTED_ORIGIN: https://github.com/${{ github.repository }}
  DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
  RECEIPT_VERIFIER_SHA256: ${{ vars.ACADEMYINFO_RELEASE_RECEIPT_VERIFIER_SHA256 }}
  RELEASE_ADMINISTRATOR: ${{ vars.ACADEMYINFO_RELEASE_ADMINISTRATOR }}
  NPM_CONFIG_REGISTRY: https://registry.npmjs.org/

jobs:
  verify-build:
    name: Verify and pack candidate without publication authority (Node 22)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    outputs:
      artifact_name: ${{ steps.package.outputs.artifact_name }}
      tarball_sha256: ${{ steps.package.outputs.tarball_sha256 }}
      package_integrity: ${{ steps.package.outputs.package_integrity }}
    steps:
      - name: Validate dispatch and protected configuration before checkout
        shell: bash
        run: |
          set -euo pipefail
          test "$CONFIRM_CANDIDATE_ONLY" = "publish-to-candidate-not-latest"
          node --input-type=module <<'NODE'
          const semver = /^(0|[1-9]\d*)\.(0|[1-9]\d*)\.(0|[1-9]\d*)(?:-[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?(?:\+[0-9A-Za-z-]+(?:\.[0-9A-Za-z-]+)*)?$/;
          const digest = /^[a-f0-9]{64}$/;
          if (!semver.test(process.env.VERSION) || /latest|candidate/i.test(process.env.VERSION)) throw new Error("An exact SemVer is required");
          if (!/^[a-f0-9]{40}$/.test(process.env.SOURCE_COMMIT)) throw new Error("A full lowercase source commit is required");
          if (!/^[a-f0-9]{40}$/.test(process.env.RECEIPT_COMMIT)) throw new Error("A full lowercase protected receipt commit is required");
          if (!/^[a-f0-9]{40}$/.test(process.env.POLICY_COMMIT)) throw new Error("A full lowercase current policy commit is required");
          if (process.env.SOURCE_COMMIT === process.env.RECEIPT_COMMIT) throw new Error("Source and protected receipt commits must be separate immutable identities");
          if (!digest.test(process.env.AUTHORIZATION_RECEIPT_DIGEST)) throw new Error("An authorization receipt SHA-256 is required");
          if (!digest.test(process.env.AUTHORIZATION_CONTEXT_DIGEST)) throw new Error("An authorization context SHA-256 is required");
          if (!digest.test(process.env.RECEIPT_VERIFIER_SHA256)) throw new Error("A protected verifier SHA-256 is required");
          if (!semver.test(process.env.EXPECTED_PREVIOUS_LATEST)) throw new Error("The authorization-bound previous latest SemVer is required");
          if (!/^[A-Za-z0-9](?:[A-Za-z0-9._@-]{0,127})$/.test(process.env.RELEASE_ADMINISTRATOR)) throw new Error("A protected release administrator identity is required");
          if (!/^[A-Za-z0-9][A-Za-z0-9._/-]*$/.test(process.env.SOURCE_TAG) || process.env.SOURCE_TAG.includes("..")) throw new Error("Invalid source tag");
          if (process.env.REPOSITORY !== "yousunjung84-edu/academyinfo-mcp") throw new Error("Unexpected repository identity");
          if (!/^[A-Za-z0-9](?:[A-Za-z0-9._/-]{0,254})$/.test(process.env.DEFAULT_BRANCH) ||
              process.env.DEFAULT_BRANCH.includes("..") || process.env.DEFAULT_BRANCH.includes("//") ||
              process.env.DEFAULT_BRANCH.endsWith("/") || process.env.DEFAULT_BRANCH.endsWith(".")) {
            throw new Error("Invalid default branch");
          }
          if (process.env.TRUSTED_ORIGIN !== `https://github.com/${process.env.REPOSITORY}`) throw new Error("Unexpected trusted HTTPS origin");
          NODE
          git check-ref-format --branch "$DEFAULT_BRANCH"

      - name: Check out protected receipt history
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ env.REPOSITORY }}
          ref: ${{ env.RECEIPT_COMMIT }}
          path: trusted-receipts
          persist-credentials: false
          fetch-depth: 0

      - name: Check out current workflow policy separately
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ env.REPOSITORY }}
          ref: ${{ env.POLICY_COMMIT }}
          path: trusted-policy
          persist-credentials: false
          fetch-depth: 0

      - name: Check out the exact candidate source separately
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ env.REPOSITORY }}
          ref: ${{ env.SOURCE_COMMIT }}
          path: candidate-source
          persist-credentials: false
          fetch-depth: 0

      - name: Install exact Node 22 without publication credentials
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: candidate-source/package-lock.json

      - name: Validate protected history, verifier bytes, authorization, tag, backend, and dependencies
        shell: bash
        run: |
          set -euo pipefail
          test "$(node -p 'process.versions.node.split(`.`)[0]')" = "22"
          test "$(git -C trusted-receipts rev-parse HEAD)" = "$RECEIPT_COMMIT"
          case "$(git -C trusted-receipts remote get-url origin)" in
            "$TRUSTED_ORIGIN"|"$TRUSTED_ORIGIN.git") ;;
            *) echo "Trusted receipt checkout origin mismatch" >&2; exit 1 ;;
          esac
          git -C trusted-receipts fetch --no-tags origin "refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          git -C trusted-receipts merge-base --is-ancestor "$RECEIPT_COMMIT" "origin/$DEFAULT_BRANCH" || {
            echo "Receipt commit is not immutable protected default-branch history" >&2
            exit 1
          }
          test "$(git -C trusted-policy rev-parse HEAD)" = "$POLICY_COMMIT"
          case "$(git -C trusted-policy remote get-url origin)" in
            "$TRUSTED_ORIGIN"|"$TRUSTED_ORIGIN.git") ;;
            *) echo "Current policy checkout origin mismatch" >&2; exit 1 ;;
          esac
          git -C trusted-policy fetch --no-tags origin "refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          test "$(git -C trusted-policy rev-parse "origin/$DEFAULT_BRANCH")" = "$POLICY_COMMIT" || {
            echo "Current workflow policy is not the exact protected default-branch tip" >&2
            exit 1
          }
          git -C trusted-policy merge-base --is-ancestor "$POLICY_COMMIT" "origin/$DEFAULT_BRANCH" || {
            echo "Current workflow policy is not protected default-branch history" >&2
            exit 1
          }
          test "$(git -C candidate-source rev-parse HEAD)" = "$SOURCE_COMMIT"
          case "$(git -C candidate-source remote get-url origin)" in
            "$TRUSTED_ORIGIN"|"$TRUSTED_ORIGIN.git") ;;
            *) echo "Candidate source checkout origin mismatch" >&2; exit 1 ;;
          esac
          git -C candidate-source fetch --no-tags origin "refs/heads/$DEFAULT_BRANCH:refs/remotes/origin/$DEFAULT_BRANCH"
          git -C candidate-source merge-base --is-ancestor "$SOURCE_COMMIT" "origin/$DEFAULT_BRANCH" || {
            echo "Source commit is not immutable protected default-branch history" >&2
            exit 1
          }
          VERIFIER="$GITHUB_WORKSPACE/trusted-policy/scripts/release-receipt-verify.mjs"
          AUTH_RECEIPT="$GITHUB_WORKSPACE/trusted-receipts/evidence/releases/$VERSION/candidate-authorization.v1.json"
          test -f "$VERIFIER" && test ! -L "$VERIFIER"
          test -f "$AUTH_RECEIPT" && test ! -L "$AUTH_RECEIPT"
          VERIFIER="$VERIFIER" node --input-type=module <<'NODE'
          import { createHash } from "node:crypto";
          import { readFileSync } from "node:fs";
          const actual = createHash("sha256").update(readFileSync(process.env.VERIFIER)).digest("hex");
          if (actual !== process.env.RECEIPT_VERIFIER_SHA256) throw new Error("Protected receipt verifier byte digest mismatch");
          NODE
          node "$VERIFIER" \
            --receipt "$AUTH_RECEIPT" \
            --kind candidate-authorization \
            --expected-digest "$AUTHORIZATION_RECEIPT_DIGEST" \
            --expected-authorization-context-digest "$AUTHORIZATION_CONTEXT_DIGEST" \
            --source-commit "$SOURCE_COMMIT" \
            --package-name "$PACKAGE_NAME" \
            --package-version "$VERSION" \
            --expected-approver "$RELEASE_ADMINISTRATOR" \
            --previous-latest "$EXPECTED_PREVIOUS_LATEST"
          test "$(git -C candidate-source rev-parse "refs/tags/$SOURCE_TAG^{commit}")" = "$SOURCE_COMMIT"
          PACKAGE_JSON="$GITHUB_WORKSPACE/candidate-source/package.json" \
          PACKAGE_LOCK="$GITHUB_WORKSPACE/candidate-source/package-lock.json" \
          node --input-type=module <<'NODE'
          import { readFileSync } from "node:fs";
          const pkg = JSON.parse(readFileSync(process.env.PACKAGE_JSON, "utf8"));
          const lock = JSON.parse(readFileSync(process.env.PACKAGE_LOCK, "utf8"));
          if (pkg.name !== process.env.PACKAGE_NAME || pkg.version !== process.env.VERSION || pkg.engines?.node !== ">=22 <23") {
            throw new Error("Package identity/version/Node contract does not match authorization");
          }
          if (lock.name !== pkg.name || lock.version !== pkg.version || lock.packages?.[""]?.name !== pkg.name || lock.packages?.[""]?.version !== pkg.version) {
            throw new Error("Dependency lock identity does not match the authorized package");
          }
          const backends = ["better-sqlite3", "sql.js"].filter((name) => Object.hasOwn(pkg.dependencies ?? {}, name));
          if (backends.length !== 1 || !Object.hasOwn(lock.packages?.[""]?.dependencies ?? {}, backends[0])) {
            throw new Error("Exactly one lock-bound receipt-approved backend must ship");
          }
          NODE

      - name: Run candidate-controlled lifecycle and package gates without any token or OIDC
        working-directory: candidate-source
        shell: bash
        env:
          NPM_CONFIG_PROVENANCE: "false"
        run: |
          set -euo pipefail
          NPM_USERCONFIG="$(mktemp "$RUNNER_TEMP/npm-userconfig.XXXXXX")"
          chmod 0600 "$NPM_USERCONFIG"
          export NPM_CONFIG_USERCONFIG="$NPM_USERCONFIG"
          npm ci
          npm run build
          npm test
          npm run package:check
          npm audit --omit=dev

      - name: Pack exact verified tarball and trusted handoff
        id: package
        shell: bash
        run: |
          set -euo pipefail
          HANDOFF="$RUNNER_TEMP/candidate-handoff"
          mkdir -p "$HANDOFF"
          PACK_RESULT="$(cd candidate-source && npm pack --ignore-scripts --json --pack-destination "$HANDOFF")"
          TARBALL_NAME="$(PACK_RESULT="$PACK_RESULT" node --input-type=module -e 'const value = JSON.parse(process.env.PACK_RESULT); if (value.length !== 1 || typeof value[0]?.filename !== "string" || value[0].name !== process.env.PACKAGE_NAME || value[0].version !== process.env.VERSION) throw new Error("Exactly one authorized package tarball required"); process.stdout.write(value[0].filename)')"
          TARBALL="$HANDOFF/$TARBALL_NAME"
          test -f "$TARBALL" && test ! -L "$TARBALL"
          TARBALL="$TARBALL" node --input-type=module <<'NODE' > "$HANDOFF/package-digests.env"
          import { createHash } from "node:crypto";
          import { readFileSync } from "node:fs";
          const bytes = readFileSync(process.env.TARBALL);
          process.stdout.write(`TARBALL_SHA256=${createHash("sha256").update(bytes).digest("hex")}\n`);
          process.stdout.write(`PACKAGE_INTEGRITY=sha512-${createHash("sha512").update(bytes).digest("base64")}\n`);
          NODE
          source "$HANDOFF/package-digests.env"
          AUTH_RECEIPT="$GITHUB_WORKSPACE/trusted-receipts/evidence/releases/$VERSION/candidate-authorization.v1.json"
          HANDOFF_PATH="$HANDOFF/handoff.v1.json" \
          AUTH_RECEIPT="$AUTH_RECEIPT" \
          TARBALL_NAME="$TARBALL_NAME" \
          TARBALL_SHA256="$TARBALL_SHA256" \
          PACKAGE_INTEGRITY="$PACKAGE_INTEGRITY" \
          node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";
          const authorization = JSON.parse(readFileSync(process.env.AUTH_RECEIPT, "utf8"));
          const payload = authorization.release_transition_evidence_payload_v1;
          const handoff = {
            schema_version: "candidate-package-handoff.v1",
            package_name: process.env.PACKAGE_NAME,
            package_version: process.env.VERSION,
            source_commit: process.env.SOURCE_COMMIT,
            source_tag: process.env.SOURCE_TAG,
            tarball_filename: process.env.TARBALL_NAME,
            tarball_sha256: process.env.TARBALL_SHA256,
            package_integrity: process.env.PACKAGE_INTEGRITY,
            receipt_commit: process.env.RECEIPT_COMMIT,
            policy_commit: process.env.POLICY_COMMIT,
            receipt_verifier_sha256: process.env.RECEIPT_VERIFIER_SHA256,
            authorization_receipt_digest: process.env.AUTHORIZATION_RECEIPT_DIGEST,
            authorization_context_digest: process.env.AUTHORIZATION_CONTEXT_DIGEST,
            previous_latest_version: process.env.EXPECTED_PREVIOUS_LATEST,
            authorization_evidence: {
              event_id: payload.event_id,
              prior_transition_digest: payload.prior_transition_digest,
              first_seen_at: payload.first_seen_at,
              deadline_at: payload.deadline_at,
              source_sha256: payload.source_sha256,
              release_data_digest_v1: payload.release_data_digest_v1,
              policy_versions: payload.policy_versions,
            },
          };
          writeFileSync(process.env.HANDOFF_PATH, `${JSON.stringify(handoff)}\n`, { mode: 0o644 });
          NODE
          cp trusted-policy/scripts/release-receipt-verify.mjs "$HANDOFF/release-receipt-verify.mjs"
          chmod 0644 "$HANDOFF/release-receipt-verify.mjs"
          cp "$AUTH_RECEIPT" "$HANDOFF/candidate-authorization.v1.json"
          chmod 0644 "$HANDOFF/candidate-authorization.v1.json"
          rm "$HANDOFF/package-digests.env"
          printf 'artifact_name=candidate-package-%s\n' "$TARBALL_SHA256" >> "$GITHUB_OUTPUT"
          printf 'tarball_sha256=%s\n' "$TARBALL_SHA256" >> "$GITHUB_OUTPUT"
          printf 'package_integrity=%s\n' "$PACKAGE_INTEGRITY" >> "$GITHUB_OUTPUT"

      - name: Upload only the digest-named verified candidate handoff
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ steps.package.outputs.artifact_name }}
          path: ${{ runner.temp }}/candidate-handoff
          if-no-files-found: error
          retention-days: 7
