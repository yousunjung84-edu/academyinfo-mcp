name: First-release rollback availability

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-rollback-availability:
    name: Verify first-release rollback availability
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - name: Emit deterministic first-release rollback unavailability
        shell: bash
        run: |
          set -euo pipefail
          ARTIFACT="$RUNNER_TEMP/first-release-rollback-unavailable.v1.json"
          ARTIFACT="$ARTIFACT" node --input-type=module <<'NODE'
          import { readFileSync, writeFileSync } from "node:fs";

          const expected = {
            schema_version: "first-release-rollback-unavailable.v1",
            status: "FIRST_RELEASE_ROLLBACK_UNAVAILABLE",
            code: "FIRST_RELEASE_ROLLBACK_UNAVAILABLE",
            package_name: "academyinfo-mcp",
            first_release_version: "0.1.0",
            rollback_available: false,
            required_recovery: "FIX_FORWARD",
            required_fix_forward_version: "0.1.1",
            message: "First-release failures require fix-forward 0.1.1 because no prior release exists to restore.",
            sanitized: true,
          };
          const exactArtifactKeys = [
            "code",
            "first_release_version",
            "message",
            "package_name",
            "required_fix_forward_version",
            "required_recovery",
            "rollback_available",
            "sanitized",
            "schema_version",
            "status",
          ];
          writeFileSync(process.env.ARTIFACT, `${JSON.stringify(expected, null, 2)}\n`, { mode: 0o644 });

          const verified = JSON.parse(readFileSync(process.env.ARTIFACT, "utf8"));
          if (JSON.stringify(verified) !== JSON.stringify(expected) ||
              JSON.stringify(Object.keys(verified).sort()) !== JSON.stringify(exactArtifactKeys) ||
              verified.status !== "FIRST_RELEASE_ROLLBACK_UNAVAILABLE" ||
              verified.code !== "FIRST_RELEASE_ROLLBACK_UNAVAILABLE" ||
              verified.rollback_available !== false ||
              verified.required_recovery !== "FIX_FORWARD" ||
              verified.required_fix_forward_version !== "0.1.1" ||
              verified.sanitized !== true) {
            throw new Error("First-release rollback unavailability artifact verification failed");
          }
          NODE
          {
            echo "### First-release rollback unavailable"
            echo "\`academyinfo-mcp@0.1.0\` has no prior release to restore."
            echo "First-release failures require a human fix-forward publication of \`0.1.1\`."
            echo "First-release rollback unavailability report generation succeeded; artifact upload is still required."
          } >> "$GITHUB_STEP_SUMMARY"
          exit 0

      - name: Upload first-release rollback unavailability
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: first-release-rollback-unavailable-${{ github.run_id }}-${{ github.run_attempt }}
          path: ${{ runner.temp }}/first-release-rollback-unavailable.v1.json
          if-no-files-found: error
          retention-days: 90