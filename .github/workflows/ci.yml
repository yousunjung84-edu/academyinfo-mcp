name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions: { contents: read }

jobs:
  test:
    name: Node 22 build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: npm test
      - name: Focused workflow-security adversarial contracts
        run: npm test -- test/public-verifier-contract.test.ts
      - run: npm run package:check

  local-tarball-smoke:
    name: Node 22 local tarball install smoke (${{ matrix.os }})
    needs: test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: pack, clean-lock install, and smoke the local tarball
        shell: bash
        env:
          NODE_GYP_FORCE_PYTHON: __academyinfo_compile_fallback_forbidden__
          npm_config_build_from_source: "false"
          npm_config_fallback_to_build: "false"
        run: |
          set -euo pipefail
          PACK_RESULT="$(npm pack --json)"
          TGZ="$(PACK_RESULT="$PACK_RESULT" node -e 'const result = JSON.parse(process.env.PACK_RESULT); process.stdout.write(result[0].filename)')"
          PKG="$GITHUB_WORKSPACE/$TGZ"
          TMP="$(mktemp -d)"
          cd "$TMP"
          npm init -y >/dev/null
          npm install --package-lock-only "$PKG"
          npm ci --foreground-scripts
          BIN="$TMP/node_modules/academyinfo-mcp/dist/src/index.js"
          node "$GITHUB_WORKSPACE/scripts/smoke-installed.mjs" "$BIN"
          # This is local-tarball evidence only. Public-npm acceptance requires the separate
          # fresh-cache exact-version npx verifier and registry integrity/provenance receipts.
